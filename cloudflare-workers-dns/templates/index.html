<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六趣DNS - 域名分发系统</title>
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script defer src="/static/js/alpine.min.js"></script>
    <script defer src="/static/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm border-b" x-data="{ mobileMenu: false, user: null }" x-init="checkAuth()">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-indigo-600">六趣DNS</a>
                    <div class="hidden md:flex ml-10 space-x-4">
                        <a href="/" class="px-3 py-2 text-gray-700 hover:text-indigo-600">首页</a>
                        <a href="/pricing" class="px-3 py-2 text-gray-700 hover:text-indigo-600">套餐</a>
                        <a href="/whois" class="px-3 py-2 text-gray-700 hover:text-indigo-600">WHOIS</a>
                    </div>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <template x-if="!user">
                        <div class="space-x-2">
                            <a href="/login" class="px-4 py-2 text-gray-700 hover:text-indigo-600">登录</a>
                            <a href="/register" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">注册</a>
                        </div>
                    </template>
                    <template x-if="user">
                        <div class="flex items-center space-x-4">
                            <a href="/user" class="text-gray-700 hover:text-indigo-600" x-text="user.username"></a>
                            <span class="text-sm text-gray-500" x-text="'余额: ¥' + user.balance"></span>
                            <button @click="logout()" class="text-red-500 hover:text-red-700 text-sm">退出</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Hero 区域 -->
        <div class="text-center py-16">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">免费二级域名分发系统</h1>
            <p class="text-xl text-gray-600 mb-8">基于 Cloudflare 的稳定DNS解析服务，支持多种记录类型</p>
            <div class="flex justify-center space-x-4">
                <a href="/register" class="px-8 py-3 bg-indigo-600 text-white rounded-lg text-lg hover:bg-indigo-700">立即注册</a>
                <a href="/pricing" class="px-8 py-3 border border-gray-300 text-gray-700 rounded-lg text-lg hover:bg-gray-50">查看套餐</a>
            </div>
        </div>

        <!-- 功能特性 -->
        <div class="grid md:grid-cols-3 gap-8 py-12">
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <div class="text-indigo-600 text-3xl mb-4">&#127760;</div>
                <h3 class="text-lg font-semibold mb-2">全球加速</h3>
                <p class="text-gray-600">基于 Cloudflare 全球 CDN 网络，DNS 解析快速稳定</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <div class="text-indigo-600 text-3xl mb-4">&#128273;</div>
                <h3 class="text-lg font-semibold mb-2">SSL 证书</h3>
                <p class="text-gray-600">自动提供免费 SSL 证书，保护您的网站安全</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <div class="text-indigo-600 text-3xl mb-4">&#128200;</div>
                <h3 class="text-lg font-semibold mb-2">多种记录</h3>
                <p class="text-gray-600">支持 A、AAAA、CNAME、TXT、MX 等多种 DNS 记录类型</p>
            </div>
        </div>

        <!-- 可用域名 -->
        <div class="py-12" x-data="domainList()" x-init="loadDomains()">
            <h2 class="text-2xl font-bold text-center mb-8">可用域名</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="domain in domains" :key="domain.id">
                    <div class="bg-white p-4 rounded-lg shadow-sm border">
                        <div class="font-semibold text-lg" x-text="domain.name"></div>
                        <div class="text-sm text-gray-500 mt-1" x-text="domain.description || '暂无描述'"></div>
                        <div class="mt-3 flex justify-between items-center">
                            <span class="text-sm text-gray-500" x-text="domain.subdomain_count + ' 个用户'"></span>
                            <a :href="'/user/domains/new?domain=' + domain.id" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">立即注册 &rarr;</a>
                        </div>
                    </div>
                </template>
            </div>
            <div x-show="domains.length === 0" class="text-center text-gray-500 py-8">
                暂无可用域名
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t mt-16">
        <div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
            <p>&copy; 2024 六趣DNS. Powered by Cloudflare Workers.</p>
        </div>
    </footer>
</body>
</html>
